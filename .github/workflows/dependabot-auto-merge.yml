name: Dependabot Auto-merge

on:
  workflow_run:
    workflows: ["Aspire Samples CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'
    steps:
      - name: Get PR number
        id: pr
        run: |
          PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"
          if [[ -z "$PR_NUMBER" ]]; then
            echo "No pull request associated with this workflow run. Skipping."
            exit 0
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App token
        id: app-token
        if: steps.pr.outputs.number != ''
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.ASPIRE_BOT_APP_ID }}
          private-key: ${{ secrets.ASPIRE_BOT_PRIVATE_KEY }}

      - name: Approve PR (if not already approved for this commit)
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          # Check whether the bot has already left an APPROVED review on the current head SHA.
          # This prevents duplicate approval entries when CI is re-run on the same commit
          # (e.g. manual re-run), while still re-approving correctly after a rebase (new SHA).
          ALREADY_APPROVED=$(gh api "repos/$GH_REPO/pulls/$PR_NUMBER/reviews" \
            --jq "[.[] | select(.state == \"APPROVED\" and .commit_id == \"$HEAD_SHA\")] | length")
          if [[ "$ALREADY_APPROVED" -gt 0 ]]; then
            echo "PR #$PR_NUMBER already approved for commit $HEAD_SHA. Skipping."
          else
            gh pr review "$PR_NUMBER" --approve --body "Auto-approving dependabot PR after successful CI."
          fi

      - name: Squash merge PR
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: gh pr merge "$PR_NUMBER" --squash --auto
